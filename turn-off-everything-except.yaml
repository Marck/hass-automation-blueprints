blueprint:
  name: Turn off everything except labelled devices and entities
  description: >
    Turn off all lights, switches, media players and climate entities across
    every area, except for the devices and entities carrying a configurable
    label (default `dontturnoff`). Can be triggered at a configurable time
    and/or by an `input_button`. Supports a debug mode that only sends a
    persistent notification listing what *would* be turned off.

    After the initial turn-off it re-checks and retries anything still on, so a
    dropped command on a congested Zigbee/cloud mesh no longer leaves a random
    handful of devices on.
  domain: automation
  input:
    exclude_labels:
      name: Labels to keep on
      description: >
        Devices and entities carrying one of these labels are excluded and will
        NOT be turned off. Defaults to the `dontturnoff` label.
      default:
        - dontturnoff
      selector:
        label:
          multiple: true
    trigger_time:
      name: Trigger time
      description: Time of day at which everything is turned off.
      default: '01:00:00'
      selector:
        time: {}
    trigger_button:
      name: Trigger button
      description: >
        Optional `input_button` that, when pressed, turns everything off
        immediately. Leave empty to only use the time trigger.
      default: []
      selector:
        entity:
          filter:
            domain: input_button
          multiple: false
    debug_mode:
      name: Debug mode
      description: >
        When enabled, nothing is turned off. Instead a persistent notification
        is created listing the entities that would have been turned off. Useful
        for verifying the exclude labels before running for real.
      default: false
      selector:
        boolean: {}
  source_url: https://github.com/Marck/hass-automation-blueprints/blob/main/turn-off-everything-except.yaml
mode: single
max_exceeded: silent
variables:
  debug_mode: !input debug_mode
  exclude_labels: !input exclude_labels
  # Entities to keep on: directly labelled entities plus every entity that
  # belongs to a labelled device.
  excluded_entities: >
    {% set ns = namespace(entities=[]) %}
    {% for label in exclude_labels %}
      {% set ns.entities = ns.entities + label_entities(label) %}
      {% for device in label_devices(label) %}
        {% set ns.entities = ns.entities + device_entities(device) %}
      {% endfor %}
    {% endfor %}
    {{ ns.entities | unique | list }}
  # Select directly from each domain's states: this covers every area AND
  # entities without an area, and doesn't depend on entities exposing a
  # device_class (the old area-from-device_class derivation skipped areas that
  # only held plain lights/switches).
  lights: >
    {{ states.light | selectattr('state', 'eq', 'on')
       | map(attribute='entity_id') | reject('in', excluded_entities) | list }}
  switches: >
    {{ states.switch | selectattr('state', 'eq', 'on')
       | map(attribute='entity_id') | reject('in', excluded_entities) | list }}
  media_players: >
    {{ states.media_player
       | rejectattr('state', 'in', ['off', 'unavailable', 'unknown', 'standby', 'idle'])
       | map(attribute='entity_id') | reject('in', excluded_entities) | list }}
  climate: >
    {{ states.climate
       | rejectattr('state', 'in', ['off', 'unavailable', 'unknown'])
       | map(attribute='entity_id') | reject('in', excluded_entities) | list }}
trigger:
  - platform: time
    at: !input trigger_time
    id: '1'
  - platform: state
    entity_id: !input trigger_button
    id: '2'
condition: []
action:
  - if:
      - condition: template
        value_template: '{{ debug_mode }}'
    then:
      - service: persistent_notification.create
        data:
          title: 'Automation Debug: Turn Off Everything Except'
          message: |
            DEBUG_MODE={{ debug_mode }}
            Excluded (kept on): {{ excluded_entities }}
            Lights to turn off: {{ lights }}
            Switches to turn off: {{ switches }}
            Media players to turn off: {{ media_players }}
            Climate to turn off: {{ climate }}
    else:
      # A single batched turn_off can silently drop commands on a congested
      # Zigbee/cloud mesh, leaving a random handful of devices on. So we loop:
      # re-evaluate what is *still* on (minus the excluded entities), turn those
      # off, wait for them to report their new state, and repeat until nothing is
      # left or we hit the pass cap. Each pass targets fewer devices, so dropped
      # commands get another chance without re-commanding what already went off.
      - repeat:
          sequence:
            - alias: Re-evaluate what is still on
              variables:
                on_lights: >
                  {{ states.light | selectattr('state', 'eq', 'on')
                     | map(attribute='entity_id')
                     | reject('in', excluded_entities) | list }}
                on_switches: >
                  {{ states.switch | selectattr('state', 'eq', 'on')
                     | map(attribute='entity_id')
                     | reject('in', excluded_entities) | list }}
                on_media: >
                  {{ states.media_player
                     | rejectattr('state', 'in',
                        ['off', 'unavailable', 'unknown', 'standby', 'idle'])
                     | map(attribute='entity_id')
                     | reject('in', excluded_entities) | list }}
                on_climate: >
                  {{ states.climate
                     | rejectattr('state', 'in', ['off', 'unavailable', 'unknown'])
                     | map(attribute='entity_id')
                     | reject('in', excluded_entities) | list }}
            - if: '{{ on_lights | length > 0 }}'
              then:
                - service: light.turn_off
                  target:
                    entity_id: '{{ on_lights }}'
                  alias: Turn off lights
            - if: '{{ on_switches | length > 0 }}'
              then:
                - service: switch.turn_off
                  target:
                    entity_id: '{{ on_switches }}'
                  alias: Turn off switches
            - if: '{{ on_media | length > 0 }}'
              then:
                - service: media_player.turn_off
                  target:
                    entity_id: '{{ on_media }}'
                  alias: Turn off media players
            - if: '{{ on_climate | length > 0 }}'
              then:
                - service: climate.turn_off
                  target:
                    entity_id: '{{ on_climate }}'
                  alias: Turn off climate
            - alias: Let devices report their new state before re-checking
              delay:
                seconds: 3
          until:
            # Stop once a full pass finds nothing still on, or after 4 passes.
            - condition: template
              value_template: >-
                {{ (on_lights | length + on_switches | length
                    + on_media | length + on_climate | length) == 0
                   or repeat.index >= 4 }}
